<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /home/fr4nc/SP_code/special-problem/STAT-LMS/public

    <Directory /home/fr4nc/SP_code/special-problem/STAT-LMS/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript text/javascript
        AddOutputFilterByType DEFLATE application/json application/xml
        AddOutputFilterByType DEFLATE image/svg+xml
        DeflateCompressionLevel 6
    </IfModule>

    # Cache headers — Vite content-hashes filenames so 1-year expiry is safe
    <IfModule mod_expires.c>
        ExpiresActive On
        <LocationMatch "^/build/assets/">
            ExpiresDefault "access plus 1 year"
            Header set Cache-Control "public, max-age=31536000, immutable"
        </LocationMatch>
        <LocationMatch "^/js/">
            ExpiresDefault "access plus 1 month"
            Header set Cache-Control "public, max-age=2592000"
        </LocationMatch>
        <LocationMatch "\.(woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$">
            ExpiresDefault "access plus 1 month"
            Header set Cache-Control "public, max-age=2592000"
        </LocationMatch>
    </IfModule>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog ${APACHE_LOG_DIR}/stat-lms-error.log
    CustomLog ${APACHE_LOG_DIR}/stat-lms-access.log combined
</VirtualHost>
